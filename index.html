<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Totalizador de Ventas</title>
</head>
<body>
    <h1 style="text-align: center;">Totalizador de Ventas</h1>

    <form id="totalizador-form">
        <div>
            <label for="cantidad-input">Cantidad de ítems:</label>
            <input type="number" id="cantidad-input">
        </div>
        <br>
        <div>
            <label for="precio-input">Precio por ítem:</label>
            <input type="number" id="precio-input">
        </div>
        <br>
        <div>
            <label for="estado-input">Estado (2 letras):</label>
            <input type="text" id="estado-input" maxlength="2">
        </div>
        <br>
        <button type="submit" id="totalizar-btn">Calcular</button>
    </form>

    <hr>

    <p style="text-align: end;">Cantidad: <strong><span id="cantidad-display">0</span></strong></p>
    <p style="text-align: end;">Precio por ítem: <strong><span id="precio-display">0</span></strong></p>
    
    <p style="text-align: end;">Precio Neto: $<strong><span id="neto-display">0</span></strong></p>

    <p style="text-align: end;">Descuento (<span id="desc-porc-display">0</span>%): <strong>-$<span id="desc-monto-display">0</span></strong></p>
    
    <p style="text-align: end;">Impuesto para el estado (<span id="imp-porc-display">0</span>%): <strong>$<span id="imp-monto-display">0</span></strong></p>

    <hr>
    <p style="text-align: end; font-size: 1.2em;"><strong>Precio Total: $<span id="total-display">0</span></strong></p>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
